<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>TaskFlow</title>
        <!-- CSS -->
        <link rel="stylesheet" href="styles.css">
        <!-- Icons -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    </head>
    
<body>

    <div class="container">
        <nav class="navbar">
            <ul class="nav-left">
                 <li>
                    <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i></a>
                </li>
                <li>
                    <a href="calendar.html"><i class="fas fa-calendar-alt"></i> </a>
                </li>
            </ul>

            <ul class="nav-right">
                <li><a href="#profile"><i class="fas fa-user"></i> </a></li>
                <li><a href="#settings"><i class="fas fa-cogs"></i> </a></li>
            </ul>
        </nav>
    

<!-- Calendar -->
    <main class="calendar">
        <div id="header">
            <button id="prevBtn">
                <i class="fa-solid fa-chevron-left"></i>
             </button>
             <div class="monthYear" id="monthYear">
                <button id="nextBtn">
                   <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>
        </div>
            <div class="days" id="days">
                <div class="day">Mon</div>
                <div class="day">Tue</div>
                <div class="day">Wed</div>
                <div class="day">Thu</div>
                <div class="day">Fri</div>
                <div class="day">Sat</div>
                <div class="day">Sun</div>
            </div>
        </main>

    </div>
    <script src="script.js"></script>
</body>
</html>
